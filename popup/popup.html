<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="../theme.js" type="module"></script>
    <link rel="stylesheet" href="../base.css">
    <link rel="stylesheet" href="../success.css">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body class="compact">

    <!-- initial state of this row (tabindexes, etc) is as an "other window" row -->
    <!-- `readonly` easier to control focusability than `disabled` -->
    <window-row id="currentWindow" tabindex="0" data-action="switch" aria-labelledby="">
      <button type="button" class="tabAction send" data-action="send" title="Send" hidden></button>
      <button type="button" class="tabAction bring" data-action="bring" title="Bring" hidden></button>
      <div class="icon"></div>
      <input id="" class="name" tabindex="-1" readonly>
      <div class="tabCount"></div>
      <button type="button" class="windowAction stash" data-action="stash" title="Stash" hidden></button>
    </window-row>

    <omnibox-row>
      <input id="omnibox" placeholder="Find windows" autofocus>
    </omnibox-row>

    <window-list tabindex="-1">
      <window-heading class="minimized" data-title="Minimized"><hr></window-heading>
    </window-list>

    <window-row id="newWindow" tabindex="0" data-action="switch" title="New" aria-label="New window" hidden>
      <button type="button" class="tabAction send" data-action="send" title="Send" hidden></button>
      <button type="button" class="tabAction bring" data-action="bring" title="Bring" hidden></button>
      <div class="icon"></div>
      <input class="name" placeholder="New window" tabindex="-1" readonly>
    </window-row>

    <footer>
      <status-bar>Loading...</status-bar>
      <button type="button" id="help" title="Help"></button>
    </footer>

    <template id="restartTemplate">
      <button type="button" id="restart">
        <img src="../icons/refresh.svg" width="15" height="15" style="vertical-align: bottom"> Restart
      </button>
    </template>

    <script src="popup.js" type="module"></script>
  </body>
</html>
